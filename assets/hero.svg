<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Anxi77 · 최현성 — An Engineer's Living Thesis. Now shipping: 1000+ kiosks live (iFoto), Unity DOTS RPG (Arcyn), 6yr composer turned engineer. Now learning: DirectX 11 6-phase roadmap, C++17 HLSL CMake, BOJ algorithms.">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#001F00"/>
    </linearGradient>
    <pattern id="dotGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#39FF14" opacity="0.18"/>
    </pattern>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <clipPath id="avatarClip">
      <circle cx="68" cy="60" r="34"/>
    </clipPath>
    <style><![CDATA[
      .han  { font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif; }
      .mono { font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Mono', Menlo, Consolas, 'D2Coding', monospace; }

      .wordmark   { font-size: 28px; font-weight: 700; fill: #39FF14; letter-spacing: 0.4px; }
      .subtitle   { font-size: 13px; fill: #8FE085; letter-spacing: 1.8px; }
      .subtitle-han { font-size: 13px; fill: #8FE085; letter-spacing: 0.4px; }
      .panel-title{ font-size: 12px; fill: #39FF14; letter-spacing: 2.4px; font-weight: 700; }
      .line       { font-size: 15px; fill: #C8FFC0; letter-spacing: 0.3px; }
      .accent     { fill: #39FF14; font-weight: 700; }
      .dim        { fill: #5A8C50; }
      .footer     { font-size: 11px; fill: #5A8C50; letter-spacing: 3px; }
      .meta       { font-size: 10px; fill: #5A8C50; letter-spacing: 2px; }
      .prompt     { fill: #39FF14; font-weight: 700; }

      .fadeA { opacity: 0; animation: fA 14s ease-out infinite; }
      .fadeB { opacity: 0; animation: fB 14s ease-out infinite; }
      .fadeC { opacity: 0; animation: fC 14s ease-out infinite; }
      .fadeD { opacity: 0; animation: fD 14s ease-out infinite; }
      .fadeE { opacity: 0; animation: fE 14s ease-out infinite; }
      .fadeF { opacity: 0; animation: fF 14s ease-out infinite; }
      .fadeG { opacity: 0; animation: fG 14s ease-out infinite; }
      .fadeH { opacity: 0; animation: fH 14s ease-out infinite; }
      .fadeI { opacity: 0; animation: fI 14s ease-out infinite; }

      @keyframes fA { 0%,1% {opacity:0} 5%,92% {opacity:1} 98%,100% {opacity:0} }
      @keyframes fB { 0%,4% {opacity:0} 8%,92% {opacity:1} 98%,100% {opacity:0} }
      @keyframes fC { 0%,10% {opacity:0} 14%,92% {opacity:1} 98%,100% {opacity:0} }
      @keyframes fD { 0%,16% {opacity:0} 20%,92% {opacity:1} 98%,100% {opacity:0} }
      @keyframes fE { 0%,22% {opacity:0} 26%,92% {opacity:1} 98%,100% {opacity:0} }
      @keyframes fF { 0%,28% {opacity:0} 32%,92% {opacity:1} 98%,100% {opacity:0} }
      @keyframes fG { 0%,34% {opacity:0} 38%,92% {opacity:1} 98%,100% {opacity:0} }
      @keyframes fH { 0%,40% {opacity:0} 44%,92% {opacity:1} 98%,100% {opacity:0} }
      @keyframes fI { 0%,12% {opacity:0} 18%,92% {opacity:1} 98%,100% {opacity:0} }

      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }

      .blink { animation: blink 0.9s steps(1,end) infinite; }
      @keyframes blink { 0%,50% { opacity: 1 } 51%,100% { opacity: 0 } }

      .scan { animation: scan 18s linear infinite; }
      @keyframes scan { from { transform: translateY(0) } to { transform: translateY(22px) } }
    ]]></style>
  </defs>

  <rect width="1200" height="420" fill="url(#bgGrad)"/>
  <g class="scan" opacity="0.45">
    <rect x="-2" y="-22" width="1204" height="464" fill="url(#dotGrid)"/>
  </g>
  <rect width="1200" height="420" fill="url(#vignette)"/>

  <g stroke="#39FF14" stroke-width="1.2" fill="none" opacity="0.85">
    <polyline points="20,20 20,40 40,40"/>
    <polyline points="1180,20 1180,40 1160,40"/>
    <polyline points="20,400 20,380 40,380"/>
    <polyline points="1180,400 1180,380 1160,380"/>
  </g>

  <g class="fadeA">
    <image x="34" y="26" width="68" height="68"
           href="data:image/jpeg;base64,"
           clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
    <circle cx="68" cy="60" r="34" fill="none" stroke="#39FF14" stroke-width="1.6"/>
    <circle cx="68" cy="60" r="37" fill="none" stroke="#39FF14" stroke-width="0.6" opacity="0.45"/>
    <circle cx="93" cy="86" r="5" fill="#000000"/>
    <circle cx="93" cy="86" r="3.5" fill="#39FF14" class="pulse"/>
  </g>

  <g class="fadeA">
    <text x="120" y="58" class="wordmark han" xml:space="preserve"><tspan class="prompt mono">&gt; </tspan><tspan class="mono">Choi Hyun Sung</tspan><tspan class="dim mono"> · </tspan><tspan>최현성</tspan></text>
    <text x="120" y="86" class="subtitle mono">FREQUENCIES TO FUNCTIONS  ·  UNITY DEV / SOFTWARE ENGINEER</text>
  </g>

  <g class="fadeB">
    <text x="1150" y="56" text-anchor="end" class="meta mono">SEOUL · KR</text>
    <text x="1150" y="76" text-anchor="end" class="meta mono">anximusic7<tspan fill="#5A8C50">@</tspan>gmail.com</text>
    <text x="1150" y="96" text-anchor="end" class="meta mono">github.com/Anxi77</text>
  </g>

  <g transform="translate(50, 128)">
    <g class="fadeA">
      <rect width="540" height="222" rx="4" fill="#001A00" fill-opacity="0.55" stroke="#1FA10A" stroke-width="1"/>
      <g stroke="#39FF14" stroke-width="1" fill="none">
        <polyline points="0,0 0,12 12,0" opacity="0.9"/>
        <polyline points="540,0 540,12 528,0" opacity="0.9"/>
      </g>
      <text x="18" y="28" class="panel-title mono">▸ NOW SHIPPING</text>
      <text x="522" y="28" text-anchor="end" class="meta mono">REAL · LIVE</text>
      <line x1="14" y1="42" x2="526" y2="42" stroke="#1FA10A" stroke-width="0.6" opacity="0.6"/>
    </g>

    <g class="fadeC">
      <circle cx="28" cy="80" r="4.5" fill="#39FF14" class="pulse"/>
      <text x="44" y="85" class="line mono"><tspan class="accent">scale</tspan>      · <tspan fill="#FFFFFF">1,000+</tspan> prod units · CS <tspan class="accent">60%↓</tspan> · solo owner</text>
    </g>

    <g class="fadeD">
      <circle cx="28" cy="120" r="4.5" fill="#39FF14" class="pulse"/>
      <text x="44" y="125" class="line mono"><tspan class="accent">arch</tspan>       · DOTS-Mono hybrid sync · zero-alloc Burst BT</text>
    </g>

    <g class="fadeE">
      <circle cx="28" cy="160" r="4.5" fill="#39FF14" class="pulse"/>
      <text x="44" y="165" class="line mono"><tspan class="accent">depth</tspan>      · GPU 4-pass color · 6-SDK · P/Invoke · COM</text>
    </g>

    <g class="fadeF">
      <line x1="14" y1="188" x2="526" y2="188" stroke="#1FA10A" stroke-width="0.6" opacity="0.4"/>
      <text x="18" y="206" class="meta mono">unity 6 · c# · c++ · python · hlsl · onnx · supabase · celery</text>
    </g>
  </g>

  <g transform="translate(620, 128)">
    <g class="fadeA">
      <rect width="530" height="222" rx="4" fill="#001A00" fill-opacity="0.55" stroke="#1FA10A" stroke-width="1"/>
      <g stroke="#39FF14" stroke-width="1" fill="none">
        <polyline points="0,0 0,12 12,0" opacity="0.9"/>
        <polyline points="530,0 530,12 518,0" opacity="0.9"/>
      </g>
      <text x="18" y="28" class="panel-title mono">▸ NOW LEARNING</text>
      <text x="512" y="28" text-anchor="end" class="meta mono">DAILY · LOOP</text>
      <line x1="14" y1="42" x2="516" y2="42" stroke="#1FA10A" stroke-width="0.6" opacity="0.6"/>
    </g>

    <g class="fadeF">
      <circle cx="28" cy="80" r="4.5" fill="#39FF14" class="pulse"/>
      <text x="44" y="85" class="line mono"><tspan class="accent">dx11</tspan>      · 6-phase · win32 → raytracing</text>
    </g>
    <g class="fadeG">
      <circle cx="28" cy="120" r="4.5" fill="#39FF14" class="pulse"/>
      <text x="44" y="125" class="line mono"><tspan class="accent">low-lvl</tspan>   · cache · MESI · branch pred</text>
    </g>
    <g class="fadeH">
      <circle cx="28" cy="160" r="4.5" fill="#39FF14" class="pulse"/>
      <text x="44" y="165" class="line mono"><tspan class="accent">cpp</tspan>       · RAII · COM · move<tspan dx="2" class="accent blink">▌</tspan></text>
    </g>

    <g class="fadeF">
      <line x1="14" y1="188" x2="516" y2="188" stroke="#1FA10A" stroke-width="0.6" opacity="0.4"/>
      <text x="18" y="206" class="meta mono">audio engineer → software engineer → systems engineer</text>
    </g>
  </g>

  <g class="fadeI">
    <g transform="translate(1060, 235)">
      <g>
        <circle cx="0" cy="0" r="62" fill="none" stroke="#39FF14" stroke-width="1" opacity="0.95"/>
        <ellipse cx="0" cy="0" rx="62" ry="12" fill="none" stroke="#39FF14" stroke-width="0.7" opacity="0.85"/>
        <ellipse cx="0" cy="0" rx="62" ry="30" fill="none" stroke="#39FF14" stroke-width="0.7" opacity="0.7"/>
        <ellipse cx="0" cy="0" rx="62" ry="48" fill="none" stroke="#39FF14" stroke-width="0.6" opacity="0.55"/>
        <ellipse cx="0" cy="0" rx="12" ry="62" fill="none" stroke="#39FF14" stroke-width="0.7" opacity="0.85"/>
        <ellipse cx="0" cy="0" rx="30" ry="62" fill="none" stroke="#39FF14" stroke-width="0.7" opacity="0.7"/>
        <ellipse cx="0" cy="0" rx="48" ry="62" fill="none" stroke="#39FF14" stroke-width="0.6" opacity="0.55"/>
        <circle cx="0" cy="-62" r="2.2" fill="#39FF14"/>
        <circle cx="0" cy="62" r="2.2" fill="#39FF14"/>
        <line x1="-62" y1="0" x2="62" y2="0" stroke="#39FF14" stroke-width="0.5" opacity="0.4"/>
        <line x1="0" y1="-62" x2="0" y2="62" stroke="#39FF14" stroke-width="0.5" opacity="0.4"/>
        <animateTransform attributeName="transform" type="rotate"
                          from="0" to="360" dur="11s" repeatCount="indefinite"/>
      </g>
      <text x="0" y="92" text-anchor="middle" class="meta mono">// rendering self</text>
    </g>
  </g>

  <g class="fadeI">
    <text x="600" y="395" text-anchor="middle" class="footer mono">END-TO-END   ·   SYSTEMS DEPTH   ·   ADAPTIVE ENGINEERING</text>
  </g>
</svg>
